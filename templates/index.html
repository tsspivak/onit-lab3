<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <title>Cat Breeds</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <style>
            body {
                background: #f6f5f7;
            }

            .card {
                border-radius: 16px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            }

            .btn-primary {
                background-color: #a3b18a;
                border: none;
            }

            .btn-primary:hover {
                background-color: #8f9f7a;
            }

            .btn-danger {
                background-color: #e5989b;
                border: none;
            }

            .btn-danger:hover {
                background-color: #d17c80;
            }

            .header {
                color: #6d6875;
                font-weight: 600;
            }
        </style>
    </head>

    <div class="container py-5">
        <h2 class="text-center mb-4 header">Cat Breeds Database</h2>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card p-4">
                    <h5 class="mb-3">Добавить породу</h5>
                    <form method="post">
                        <input
                            class="form-control mb-2"
                            name="name"
                            placeholder="Название"
                            required
                        />
                        <input
                            class="form-control mb-2"
                            name="origin"
                            placeholder="Происхождение"
                        />
                        <input
                            class="form-control mb-2"
                            name="lifespan"
                            placeholder="Продолжительность жизни"
                        />
                        <input
                            class="form-control mb-2"
                            name="weight"
                            type="number"
                            step="0.1"
                            placeholder="Вес (кг)"
                        />
                        <input
                            class="form-control mb-2"
                            name="coat"
                            placeholder="Шерсть"
                        />
                        <input
                            class="form-control mb-2"
                            name="temperament"
                            placeholder="Темперамент"
                        />
                        <textarea
                            class="form-control mb-3"
                            name="description"
                            placeholder="Описание"
                        ></textarea>
                        <button class="btn btn-primary w-100">Добавить</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-4">
                    <h5 class="mb-3">Список пород</h5>
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Название</th>
                                <th>Страна</th>
                                <th>Вес</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for b in breeds %}
                            <tr>
                                <td>{{ b.name }}</td>
                                <td>{{ b.origin }}</td>
                                <td>{{ b.weight }}</td>
                                <td>
                                    <button
                                        class="btn btn-sm btn-primary"
                                        data-bs-toggle="modal"
                                        data-bs-target="#breedModal"
                                        onclick="openModal(
                                        '{{ b.name }}',
                                        '{{ b.origin }}',
                                        '{{ b.lifespan }}',
                                        '{{ b.weight }}',
                                        '{{ b.coat }}',
                                        '{{ b.temperament }}',
                                        `{{ b.description }}`
                                    )"
                                    >
                                        Подробнее
                                    </button>

                                    <button
                                        class="btn btn-sm btn-warning"
                                        data-bs-toggle="modal"
                                        data-bs-target="#editModal"
                                        onclick="openEditModal(
                                        {{ b.id }},
                                        '{{ b.name }}',
                                        '{{ b.origin }}',
                                        '{{ b.lifespan }}',
                                        '{{ b.weight }}',
                                        '{{ b.coat }}',
                                        '{{ b.temperament }}',
                                        `{{ b.description }}`
                                    )"
                                    >
                                        Редактировать
                                    </button>

                                    <a
                                        href="/delete/{{ b.id }}"
                                        class="btn btn-danger btn-sm"
                                        >Удалить</a
                                    >
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="breedModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content" style="border-radius: 16px">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalName"></h5>
                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                    ></button>
                </div>
                <div class="modal-body">
                    <p><b>Происхождение:</b> <span id="modalOrigin"></span></p>
                    <p>
                        <b>Продолжительность жизни:</b>
                        <span id="modalLife"></span>
                    </p>
                    <p><b>Вес:</b> <span id="modalWeight"></span></p>
                    <p><b>Шерсть:</b> <span id="modalCoat"></span></p>
                    <p><b>Темперамент:</b> <span id="modalTemp"></span></p>
                    <hr />
                    <p id="modalDesc" style="color: #555"></p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content" style="border-radius: 16px">
                <form method="post" id="editForm">
                    <div class="modal-header">
                        <h5 class="modal-title">Редактировать породу</h5>
                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                        ></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="id" id="editId" />

                        <input
                            class="form-control mb-2"
                            name="name"
                            id="editName"
                            placeholder="Название"
                            required
                        />
                        <input
                            class="form-control mb-2"
                            name="origin"
                            id="editOrigin"
                            placeholder="Происхождение"
                        />
                        <input
                            class="form-control mb-2"
                            name="lifespan"
                            id="editLifespan"
                            placeholder="Продолжительность жизни"
                        />
                        <input
                            class="form-control mb-2"
                            name="weight"
                            id="editWeight"
                            type="number"
                            step="0.1"
                            placeholder="Вес (кг)"
                        />
                        <input
                            class="form-control mb-2"
                            name="coat"
                            id="editCoat"
                            placeholder="Шерсть"
                        />
                        <input
                            class="form-control mb-2"
                            name="temperament"
                            id="editTemperament"
                            placeholder="Темперамент"
                        />
                        <textarea
                            class="form-control mb-3"
                            name="description"
                            id="editDescription"
                            placeholder="Описание"
                        ></textarea>
                    </div>
                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal"
                        >
                            Отмена
                        </button>
                        <button type="submit" class="btn btn-primary">
                            Сохранить изменения
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function openModal(name, origin, life, weight, coat, temp, desc) {
            document.getElementById("modalName").innerText = name;
            document.getElementById("modalOrigin").innerText = origin || "—";
            document.getElementById("modalLife").innerText = life || "—";
            document.getElementById("modalWeight").innerText = weight || "—";
            document.getElementById("modalCoat").innerText = coat || "—";
            document.getElementById("modalTemp").innerText = temp || "—";
            document.getElementById("modalDesc").innerText =
                desc || "Нет описания";
        }

        function openEditModal(
            id,
            name,
            origin,
            life,
            weight,
            coat,
            temp,
            desc,
        ) {
            document.getElementById("editId").value = id;
            document.getElementById("editName").value = name;
            document.getElementById("editOrigin").value = origin;
            document.getElementById("editLifespan").value = life;
            document.getElementById("editWeight").value = weight;
            document.getElementById("editCoat").value = coat;
            document.getElementById("editTemperament").value = temp;
            document.getElementById("editDescription").value = desc;

            document.getElementById("editForm").action = "/";
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
